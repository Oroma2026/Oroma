<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ORÓMA – Capture the Flag</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 12px; background:#111; color:#eee; }
    .card { background:#1b1b1b; border:1px solid #333; border-radius:10px; padding:12px; margin-bottom:12px; }
    .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .btn { padding:8px 12px; border-radius:8px; border:1px solid #444; background:#2a2a2a; color:#eee; cursor:pointer; }
    .btn.primary { background:#1f6feb; border-color:#1f6feb; }
    .btn.ok { background:#238636; border-color:#238636; }
    .btn.warn { background:#b45309; border-color:#b45309; }
    input, select { background:#0f0f0f; color:#eee; border:1px solid #444; border-radius:8px; padding:8px; }
    pre { background:#0f0f0f; border:1px solid #333; border-radius:10px; padding:12px; overflow:auto; }
    .muted { color:#aaa; font-size: 0.95em; }
    .kpi { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 6px 0;">🏁 Capture the Flag</h2>
    <div class="muted">Grid-World · UniversalPolicy · Default: Explore</div>
    <div class="row" style="margin-top:10px;">
      <label>Mode
        <select id="mode">
          <option value="oroma_vs_oroma_explore">oroma_vs_oroma_explore (eps&gt;0) [default]</option>
          <option value="oroma_vs_oroma_policy">oroma_vs_oroma_policy (eps=0)</option>
          <option value="human">human (A via WASD/Pfeile)</option>
        </select>
      </label>
      <label>Autoplay <input id="autoplay" type="checkbox" checked /></label>
      <label>Auto-Reset <input id="auto_reset" type="checkbox" checked /></label>
      <label>eps <input id="eps" type="number" step="0.01" min="0" max="1" value="0.08" style="width:90px;"/></label>
      <label>explore_moves <input id="explore_moves" type="number" min="0" max="10" value="1" style="width:90px;"/></label>
      <button class="btn ok" id="btnStart">Start</button>
      <button class="btn warn" id="btnStop">Stop</button>
      <button class="btn primary" id="btnApply">Apply</button>
      <button class="btn" id="btnReset">Reset</button>
    </div>
  </div>

  <div class="card">
    <pre id="ascii" class="kpi">loading…</pre>
    <div class="kpi" id="meta"></div>
    <div class="muted" style="margin-top:6px;">
      Controls (human): <b>WASD</b> oder <b>Pfeile</b>. Aktionen: 0=stay, 1=up, 2=down, 3=left, 4=right.
    </div>
    <div class="muted">Tipp: Stop pausiert den Tick-Loop (keine /step Calls). Auto-Reset startet bei done automatisch neu.</div>
  </div>

<script>
let POLL_MS = 500;

function postJSON(url, obj) {
  return fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(obj||{})})
    .then(r => r.json());
}

function refresh() {
  fetch('/ctf/api/state').then(r => r.json()).then(s => {
    if (!s || !s.ok) return;
    document.getElementById('ascii').textContent = s.ascii || '';
    document.getElementById('meta').textContent =
      `mode=${s.mode} · autoplay=${s.autoplay} · eps=${s.eps} · rules=${s.policy_rules} · steps=${s.scores.steps} · scoreA=${s.scores.A} scoreB=${s.scores.B}` +
      (s.err ? ` · err=${s.err}` : '');
    document.getElementById('mode').value = s.mode || 'oroma_vs_oroma_explore';
    document.getElementById('autoplay').checked = !!s.autoplay;
    document.getElementById('auto_reset').checked = !!s.auto_reset;
    document.getElementById('eps').value = s.eps;
    document.getElementById('explore_moves').value = s.explore_moves_per_game;
  }).catch(()=>{});
}

document.getElementById('btnApply').onclick = () => {
  const mode = document.getElementById('mode').value;
  const eps = parseFloat(document.getElementById('eps').value || '0');
  const explore_moves_per_game = parseInt(document.getElementById('explore_moves').value || '0', 10);
  const auto_reset = document.getElementById('auto_reset').checked;
  const autoplay = document.getElementById('autoplay').checked;
  postJSON('/ctf/api/mode', {mode}).then(()=> postJSON('/ctf/api/settings', {eps, explore_moves_per_game, auto_reset, autoplay})).then(refresh);
};

document.getElementById('btnReset').onclick = () => postJSON('/ctf/api/reset', {}).then(refresh);

document.getElementById('btnStart').onclick = () => {
  // Start sets default explore + autoplay true (as requested "Default Explore")
  document.getElementById('mode').value = 'oroma_vs_oroma_explore';
  document.getElementById('autoplay').checked = true;
  document.getElementById('auto_reset').checked = true;
  document.getElementById('eps').value = document.getElementById('eps').value || '0.08';
  document.getElementById('explore_moves').value = document.getElementById('explore_moves').value || '1';
  document.getElementById('btnApply').click();
};

document.getElementById('btnStop').onclick = () => postJSON('/ctf/api/settings', {autoplay:false}).then(refresh);

document.addEventListener('keydown', (ev) => {
  const mode = document.getElementById('mode').value;
  if (mode !== 'human') return;
  let a = null;
  if (ev.key === 'ArrowUp' || ev.key === 'w' || ev.key === 'W') a = 1;
  if (ev.key === 'ArrowDown' || ev.key === 's' || ev.key === 'S') a = 2;
  if (ev.key === 'ArrowLeft' || ev.key === 'a' || ev.key === 'A') a = 3;
  if (ev.key === 'ArrowRight' || ev.key === 'd' || ev.key === 'D') a = 4;
  if (ev.key === ' ') a = 0;
  if (a !== null) {
    postJSON('/ctf/api/move', {action:a}).then(()=>{});
    ev.preventDefault();
  }
});

setInterval(refresh, POLL_MS);
refresh();
</script>
</body>
</html>
