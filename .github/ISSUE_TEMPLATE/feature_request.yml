name: Feature request
description: Suggest an ORÓMA improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep feature requests focused and public-safe.
        Do not include private runtime data, databases, logs, .env files, camera/audio captures, or personal data.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should ORÓMA be able to do?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful for offline-first edge intelligence?
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: Proposed design
      description: Optional implementation idea, module, route, tool, or documentation area.
    validations:
      required: false
