# ============================================================
# ORÓMA v3.7 – pytest.ini
# Pfad: /opt/ai/oroma/pytest.ini
# Zweck: Konfiguration für pytest – Testpfade, Marker, Optionen
# ============================================================

[pytest]
# Kürzere, übersichtliche Ausgabe
addopts = -q -ra

# Haupt-Testverzeichnisse
testpaths =
    tests
    core
    ui
    tools

# Damit lokale Pakete (core/, ui/, wrappers/, etc.) importiert werden können
pythonpath = .

# Markierungen für Kategorien
markers =
    core:      Tests für Kernmodule (Snap, Chains, DB, Mutation)
    ui:        Tests für Flask-UI und Blueprints
    wrapper:   Tests für Wrapper (Vision, Audio, PiCar, etc.)
    tools:     Tests für Tools und Skripte (migrate.py, init_db.sh, sim_learn)
    metasnap:  Tests für MetaSnaps (v3.5 spezifisch)
    slow:      Tests, die lange laufen (z. B. ASR, LLM, Vision)
